name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-type-test:
    name: ci-lint-type-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Node project
        id: node
        shell: bash
        run: |
          if [ -f package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No package.json yet. CI scaffold is ready for the application stack."
          fi

      - name: Set up Node.js
        if: steps.node.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"
          cache-dependency-path: "yarn.lock"

      - name: Install dependencies
        if: steps.node.outputs.present == 'true'
        shell: bash
        run: |
          corepack enable
          corepack yarn install --frozen-lockfile

      - name: Lint
        if: steps.node.outputs.present == 'true'
        shell: bash
        run: |
          if node -e "process.exit(require('./package.json').scripts?.lint ? 0 : 1)"; then
            corepack yarn lint
          else
            echo "No lint script configured."
          fi

      - name: Typecheck
        if: steps.node.outputs.present == 'true'
        shell: bash
        run: |
          if node -e "const s=require('./package.json').scripts||{}; process.exit((s.typecheck || s['type-check']) ? 0 : 1)"; then
            script=$(node -p "const s=require('./package.json').scripts||{}; s.typecheck ? 'typecheck' : 'type-check'")
            corepack yarn "$script"
          else
            echo "No typecheck script configured."
          fi

      - name: Test
        if: steps.node.outputs.present == 'true'
        shell: bash
        run: |
          if node -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)"; then
            corepack yarn test
          else
            echo "No test script configured."
          fi

