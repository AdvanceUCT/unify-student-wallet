name: Security

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  dependency-audit:
    name: security-dependency-audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Node project
        id: node
        shell: bash
        run: |
          if [ -f package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No package.json yet. Security audit scaffold is ready."
          fi

      - name: Set up Node.js
        if: steps.node.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"
          cache-dependency-path: "yarn.lock"

      - name: Audit dependencies
        if: steps.node.outputs.present == 'true'
        shell: bash
        run: |
          corepack enable
          corepack yarn install --frozen-lockfile
          set +e
          corepack yarn audit --level high
          audit_status=$?
          set -e

          if [ "$audit_status" -ne 0 ]; then
            echo "::warning::Yarn audit found high-severity dependency advisories. Review the audit output and decide whether to patch, pin, or accept the transitive risk for the current prototype."
          fi

